name: XAUUSD Signal Check

on:
  schedule:
    # Every 15 min, Sunday-Friday (day-of-week 0=Sun ... 6=Sat), skipping
    # Saturday entirely - spot gold is always closed all day Saturday, so
    # this is a free first line of defense (also saves Action minutes).
    # This is NOT the authoritative market-hours check - it can't express
    # "closed after 17:00 ET Friday" or "opens 17:00 ET Sunday" since cron
    # only knows whole days. bot.py's own market_is_open() check (DST-aware,
    # via zoneinfo) is what actually enforces the precise open/close times;
    # this cron trim just avoids paying for 96 guaranteed-closed Saturday
    # runs a week.
    - cron: "*/15 * * * 0-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signal check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: python bot.py

      - name: Save state back to repo
        run: |
          git config user.name "xauusd-signal-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          if [ -f near_misses.log ]; then
            git add near_misses.log
          fi
          git diff --staged --quiet || git commit -m "Update signal state [skip ci]"
          git push
