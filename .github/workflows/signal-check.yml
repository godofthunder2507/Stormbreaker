name: XAUUSD Signal Check

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signal check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: python bot.py

      - name: Save state back to repo
        run: |
          git config user.name "xauusd-signal-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          if [ -f near_misses.log ]; then
            git add near_misses.log
          fi
          git diff --staged --quiet || git commit -m "Update signal state [skip ci]"
          git push
